<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Soundboard</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

#upload{
  margin-bottom:10px;
}

#board{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:12px;
  padding:12px;
}

.pad{
  background:#1e1e1e;
  border-radius:14px;
  padding:18px 10px;
  cursor:pointer;
  user-select:none;
  touch-action:manipulation;
  font-size:14px;
  border:2px solid transparent;
  transition:0.1s;
}

.pad:active{
  transform:scale(0.95);
  background:#2a7cff;
}

.dragging{
  opacity:0.4;
}

.hint{
  font-size:12px;
  opacity:0.6;
  margin-bottom:10px;
}
</style>
</head>
<body>

<header>Soundboard</header>

<input id="upload" type="file" accept="audio/mp3,audio/wav" multiple>
<div class="hint">Tippen = Sound | Gedrückt halten + ziehen = verschieben</div>

<div id="board"></div>

<script>
const board = document.getElementById("board")
const upload = document.getElementById("upload")

let sounds = JSON.parse(localStorage.getItem("soundboard") || "[]")

function save(){
  localStorage.setItem("soundboard",JSON.stringify(sounds))
}

function createPad(sound,index){
  const pad=document.createElement("div")
  pad.className="pad"
  pad.draggable=true
  pad.textContent=sound.name

  const audio=new Audio(sound.data)

  pad.onclick=()=>{
    audio.currentTime=0
    audio.play()
  }

  pad.addEventListener("dragstart",()=>{
    pad.classList.add("dragging")
  })

  pad.addEventListener("dragend",()=>{
    pad.classList.remove("dragging")
    updateOrder()
  })

  board.appendChild(pad)
}

function render(){
  board.innerHTML=""
  sounds.forEach(createPad)
}

function updateOrder(){
  const pads=[...board.children]
  const newSounds=[]

  pads.forEach(p=>{
    const name=p.textContent
    const s=sounds.find(x=>x.name===name)
    if(s) newSounds.push(s)
  })

  sounds=newSounds
  save()
}

board.addEventListener("dragover",e=>{
  e.preventDefault()
  const dragging=document.querySelector(".dragging")
  const after=getDragAfter(e.clientY,e.clientX)

  if(after==null){
    board.appendChild(dragging)
  }else{
    board.insertBefore(dragging,after)
  }
})

function getDragAfter(y,x){
  const els=[...board.querySelectorAll(".pad:not(.dragging)")]

  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect()

    const offset=y-box.top-box.height/2

    if(offset<0 && offset>closest.offset){
      return {offset:offset,element:child}
    }else{
      return closest
    }

  },{offset:Number.NEGATIVE_INFINITY}).element
}

upload.addEventListener("change",()=>{
  const files=[...upload.files]

  files.forEach(file=>{

    const reader=new FileReader()

    reader.onload=e=>{
      sounds.push({
        name:file.name.replace(/\.[^/.]+$/, ""),
        data:e.target.result
      })

      save()
      render()
    }

    reader.readAsDataURL(file)

  })
})

render()
</script>

</body>
</html>
